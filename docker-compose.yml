version: '3.9'

services:

  mysql:
    image: mysql:8.4
    container_name: hotel-mysql

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: hoteldb

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

  hotel-api:
    build: .

    container_name: hotel-api

    depends_on:
      - mysql

    ports:
      - "8080:8080"

    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/hoteldb
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root

volumes:
  mysql_data: